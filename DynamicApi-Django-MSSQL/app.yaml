apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dynamic-api-django-mssql
  namespace: default
  labels:
    app: dynamic-api
    version: mssql
    framework: django

spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "100"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/targetUtilizationPercentage: "80"
      labels:
        version: mssql
    spec:
      serviceAccountName: default
      
      containers:
      - name: django-mssql-api
        image: gcr.io/YOUR_PROJECT_ID/dynamic-api-django-mssql:latest
        
        # Port configuration
        ports:
        - name: http1
          containerPort: 8080
        
        # Resource limits
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        
        # Environment variables
        env:
        - name: PORT
          value: "8080"
        - name: DJANGO_SETTINGS_MODULE
          value: "config.settings.production"
        - name: ENVIRONMENT
          value: "production"
        
        # MSSQL configuration (from Cloud SQL)
        - name: MSSQL_SERVER
          valueFrom:
            secretKeyRef:
              name: django-mssql-secret
              key: server
        - name: MSSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: django-mssql-secret
              key: database
        - name: MSSQL_USER
          valueFrom:
            secretKeyRef:
              name: django-mssql-secret
              key: user
        - name: MSSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: django-mssql-secret
              key: password
        - name: MSSQL_ENCRYPT
          value: "true"
        - name: MSSQL_TRUST_SERVER_CERTIFICATE
          value: "false"
        
        # Email configuration
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: email-config-secret
              key: smtp_host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: email-config-secret
              key: smtp_port
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: email-config-secret
              key: smtp_user
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: email-config-secret
              key: smtp_password
        - name: OTP_EMAIL_FROM
          valueFrom:
            secretKeyRef:
              name: email-config-secret
              key: otp_from
        
        # JWT configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        
        # CORS configuration
        - name: ALLOWED_ORIGINS
          value: "https://your-vercel-domain.vercel.app,https://your-custom-domain.com"
        
        # Liveness and readiness probes
        livenessProbe:
          httpGet:
            path: /api/v1.0/DynamicApi/Health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/v1.0/DynamicApi/Health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsReadOnlyRootFilesystem: false
        capabilities:
          drop:
          - all
      
      # Request timeout
      timeoutSeconds: 90

  traffic:
  - percent: 100
    latestRevision: true
