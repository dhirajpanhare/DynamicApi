name = "dynamic-api-mongodb"
type = "javascript"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
workers_dev = true
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "dynamic-api-mongodb-prod"
route = "api.yourdomain.com/mongodb/*"
zone_id = "YOUR_ZONE_ID"

[build]
command = "npm install"
cwd = "."

[env.production.vars]
NODE_ENV = "production"
MONGODB_URI = "mongodb+srv://admin:YOUR_PASSWORD@cluster0.xxxxx.mongodb.net/dynamicapi_prod?retryWrites=true&w=majority"
JWT_SECRET = "your-secure-random-secret-key-here-min-32-chars"
OTP_EMAIL_FROM = "noreply@yourdomain.com"
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = "587"
SMTP_USER = "your-email@gmail.com"
SMTP_PASSWORD = "your-app-password"
ALLOWED_ORIGINS = "https://your-vercel-domain.vercel.app"
LOG_LEVEL = "info"

[env.development.vars]
NODE_ENV = "development"
MONGODB_URI = "mongodb://localhost:27017/dynamicapi_dev"
JWT_SECRET = "dev-secret-key-not-used-in-dev"
OTP_EMAIL_FROM = "dev@localhost"
SMTP_HOST = "localhost"
SMTP_PORT = "1025"
LOG_LEVEL = "debug"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dynamic-api-logs"
jurisdiction = "eu"

[triggers]
crons = ["0 0 * * *"]
